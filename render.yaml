services:
  - type: web
    name: egret-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install --only-binary=:all: -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./egret.db
      - key: REDIS_URL
        value: ""
      - key: CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: egret-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production next start -p $PORT
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://egret-3.onrender.com
